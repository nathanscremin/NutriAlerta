<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriAlerta — NutriBot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --accent: #39d353;
      --accent-dim: #1a6b2a;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --user-bubble: #1c2d1e;
      --bot-bubble: #161b22;
      --danger: #f85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    header h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    header span {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-left: auto;
      background: var(--border);
      padding: 3px 8px;
      border-radius: 4px;
    }

    /* CONTEXT BANNER */
    #context-banner {
      background: var(--accent-dim);
      border-bottom: 1px solid var(--accent);
      padding: 8px 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      display: none;
      gap: 16px;
      flex-wrap: wrap;
    }

    #context-banner.visible { display: flex; }
    #context-banner strong { color: #fff; }

    /* MESSAGES */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 72%;
      gap: 4px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--accent-dim);
      color: var(--text);
      border-bottom-right-radius: 3px;
    }

    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* TYPING */
    .typing-dots {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 18px;
    }

    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* CONTEXT FORM */
    #context-form {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      background: var(--surface);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      flex-shrink: 0;
    }

    #context-form label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #context-form input, #context-form select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #context-form input:focus, #context-form select:focus {
      border-color: var(--accent);
    }

    #context-form select option { background: var(--surface); }

    #apply-context {
      grid-column: 1 / -1;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
    }

    #apply-context:hover { background: #255c2e; }

    /* TOGGLE */
    #toggle-context {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      margin-left: 8px;
    }

    #toggle-context:hover { border-color: var(--accent); color: var(--accent); }

    /* INPUT BAR */
    #input-bar {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      height: 48px;
    }

    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      color: #0d1117;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>NutriBot</h1>
  <button id="toggle-context">⚙ contexto UBS</button>
  <span id="session-id-display">session: —</span>
</header>

<!-- Banner mostrando contexto ativo -->
<div id="context-banner">
  <span>UBS: <strong id="b-ubs">—</strong></span>
  <span>Ano: <strong id="b-ano">—</strong></span>
  <span>Faixa: <strong id="b-faixa">—</strong></span>
  <span>Risco: <strong id="b-risco">—</strong></span>
  <span>P(Alto): <strong id="b-prob">—</strong></span>
  <span>ΔObesidade: <strong id="b-dob">—</strong></span>
  <span>ΔDesnutrição: <strong id="b-ddes">—</strong></span>
</div>

<!-- Form de contexto (simulando clique no mapa) -->
<div id="context-form" style="display:none;">
  <label>UBS
    <input id="f-ubs" type="text" placeholder="UBS DR MARIO" />
  </label>
  <label>Ano
    <input id="f-ano" type="number" value="2024" />
  </label>
  <label>Faixa Etária
    <select id="f-faixa">
      <option>0 a 5 anos</option>
      <option>5 a 10 anos</option>
      <option>10 a 19 anos</option>
      <option>20 a 59 anos</option>
      <option>60+ anos</option>
    </select>
  </label>
  <label>Risco Predito
    <select id="f-risco">
      <option>Alto</option>
      <option>Médio</option>
      <option>Baixo</option>
    </select>
  </label>
  <label>Prob. Alto (0–1)
    <input id="f-prob" type="number" step="0.01" value="0.87" />
  </label>
  <label>Δ Obesidade
    <input id="f-dob" type="number" step="0.1" value="6.2" />
  </label>
  <label>Δ Desnutrição
    <input id="f-ddes" type="number" step="0.1" value="1.1" />
  </label>
  <button id="apply-context">▶ Aplicar contexto da UBS</button>
</div>

<div id="messages"></div>

<div id="input-bar">
  <textarea id="user-input" placeholder="Pergunte sobre a UBS selecionada..." rows="1"></textarea>
  <button id="send-btn">Enviar</button>
</div>

<script>
  // --- Estado ---
  const SESSION_ID = localStorage.getItem('nutribot_session') || 'session-' + Math.random().toString(36).slice(2, 9);
  localStorage.setItem('nutribot_session', SESSION_ID);
  document.getElementById('session-id-display').textContent = 'session: ' + SESSION_ID;

  let screenData = null;

  // --- Carregar Histórico ---
  async function loadHistory() {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: SESSION_ID,
        message: '__GET_HISTORY__',
        context: { screenData: null }
      })
    });
    const data = await res.json();
    if (data.history && data.history.length > 0) {
      data.history.forEach(entry => {
        const role = entry.role === 'user' ? 'user' : 'bot';
        entry.parts.forEach(part => {
          if (part.text) addMessage(role, part.text);
        });
      });
    }
  } catch (e) {}
}

loadHistory();

  // --- Aplicar contexto ---
  document.getElementById('apply-context').addEventListener('click', () => {
    screenData = {
      ubs: document.getElementById('f-ubs').value || 'UBS DR MARIO',
      ano: parseInt(document.getElementById('f-ano').value),
      faixa_etaria: document.getElementById('f-faixa').value,
      risco_predito: document.getElementById('f-risco').value,
      prob_alto: parseFloat(document.getElementById('f-prob').value),
      delta_obesidade: parseFloat(document.getElementById('f-dob').value),
      delta_desnutricao: parseFloat(document.getElementById('f-ddes').value),
    };

    // Atualiza banner
    document.getElementById('b-ubs').textContent   = screenData.ubs;
    document.getElementById('b-ano').textContent   = screenData.ano;
    document.getElementById('b-faixa').textContent = screenData.faixa_etaria;
    document.getElementById('b-risco').textContent = screenData.risco_predito;
    document.getElementById('b-prob').textContent  = screenData.prob_alto;
    document.getElementById('b-dob').textContent   = screenData.delta_obesidade;
    document.getElementById('b-ddes').textContent  = screenData.delta_desnutricao;
    document.getElementById('context-banner').classList.add('visible');

    contextForm.style.display = 'none';
    addMessage('bot', `Contexto carregado: ${screenData.ubs} · ${screenData.faixa_etaria} · Risco ${screenData.risco_predito}`);
  });

  // --- Mensagens ---
  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'Gestor' : 'NutriBot';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    document.getElementById('messages').appendChild(wrap);
    document.getElementById('messages').scrollTop = 999999;
    return bubble;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing';

    const dots = document.createElement('div');
    dots.className = 'typing-dots bubble';
    dots.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(dots);
    document.getElementById('messages').appendChild(wrap);
    document.getElementById('messages').scrollTop = 999999;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  // --- Envio ---
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    addMessage('user', text);
    showTyping();
    document.getElementById('send-btn').disabled = true;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId: SESSION_ID,
          message: text,
          context: { screenData: screenData }
        })
      });

      const data = await res.json();
      removeTyping();
      addMessage('bot', data.response || data.error || 'Sem resposta.');
    } catch (err) {
      removeTyping();
      addMessage('bot', 'Erro de conexão com a API.');
    }

    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Mensagem inicial
  addMessage('bot', 'Olá. Selecione uma UBS pelo painel de contexto (⚙) para começar a análise.');
</script>
</body>
</html>
